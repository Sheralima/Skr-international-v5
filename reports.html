<script type="module">

import { auth, db } from "./firebase.js";

import {
onAuthStateChanged,
signOut
} from "https://www.gstatic.com/firebasejs/12.16.0/firebase-auth.js";

import {
collection,
getCountFromServer
} from "https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore.js";

async function loadReports(){

    // Users Count
    const usersSnapshot =
    await getCountFromServer(collection(db,"users"));

    const users =
    usersSnapshot.data().count;

    // Messages Count
    const messagesSnapshot =
    await getCountFromServer(collection(db,"messages"));

    const messages =
    messagesSnapshot.data().count;

    // Update Dashboard
    document.getElementById("reportUsers").innerText = users;
    document.getElementById("reportMessages").innerText = messages;

    document.getElementById("summaryUsers").innerText = users;
    document.getElementById("summaryMessages").innerText = messages;

    // Simple Today Report
    document.getElementById("todayReports").innerText =
    users + messages;

}
