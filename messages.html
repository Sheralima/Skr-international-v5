<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Messages | SKR INTERNATIONAL</title>

<link rel="stylesheet" href="style.css">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<!-- Navbar -->

<nav class="navbar navbar-dark bg-primary">

<div class="container">

<a href="dashboard.html" class="navbar-brand fw-bold">

<i class="bi bi-speedometer2 me-2"></i>

SKR INTERNATIONAL Admin

</a>

<div>

<a href="dashboard.html" class="btn btn-light me-2">

<i class="bi bi-house-fill"></i>
Dashboard

</a>

<button id="logoutBtn" class="btn btn-warning">

<i class="bi bi-box-arrow-right"></i>
Logout

</button>

</div>

</div>

</nav>

<!-- Messages -->

<div class="container py-5">

<div class="d-flex justify-content-between align-items-center mb-4">

<h2>

<i class="bi bi-envelope-fill text-primary"></i>

Contact Messages

</h2>

<span class="badge bg-primary">

Total:
<span id="messageTotal">0</span>

</span>

</div>

<div class="card shadow">

<div class="card-body">

<div class="table-responsive">

<table class="table table-bordered table-hover align-middle">

<thead class="table-dark">

<tr>

<th>#</th>

<th>Name</th>

<th>Email</th>

<th>Subject</th>

<th>Message</th>

<th>Action</th>

</tr>

</thead>

<tbody id="messagesTable">

<tr>

<td colspan="6" class="text-center">

Loading Messages...

</td>

</tr>

</tbody>

</table>

</div>

</div>

</div>

</div>
  <footer class="bg-dark text-white text-center py-3">

<div class="container">

<p class="mb-0">
© 2026 SKR INTERNATIONAL
</p>

</div>

</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

<script type="module">

import { auth, db } from "./firebase.js";

import {
onAuthStateChanged,
signOut
} from "https://www.gstatic.com/firebasejs/12.16.0/firebase-auth.js";

import {
collection,
getDocs,
deleteDoc,
doc
} from "https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore.js";

const table = document.getElementById("messagesTable");
const total = document.getElementById("messageTotal");

async function loadMessages(){

    const snapshot = await getDocs(collection(db,"messages"));

    table.innerHTML = "";

    let count = 0;

    snapshot.forEach((messageDoc)=>{

        count++;

        const data = messageDoc.data();

        table.innerHTML += `
        <tr>
            <td>${count}</td>
            <td>${data.name || ""}</td>
            <td>${data.email || ""}</td>
            <td>${data.subject || ""}</td>
            <td>${data.message || ""}</td>
            <td>
                <button class="btn btn-danger btn-sm delete-btn"
                data-id="${messageDoc.id}">
                Delete
                </button>
            </td>
        </tr>
        `;

    });

    total.innerText = count;

    document.querySelectorAll(".delete-btn").forEach(btn=>{

        btn.addEventListener("click", async ()=>{

            if(confirm("Delete this message?")){

                await deleteDoc(doc(db,"messages",btn.dataset.id));

                loadMessages();

            }

        });

    });

}

onAuthStateChanged(auth,(user)=>{

    if(user){

        loadMessages();

    }else{

        window.location.href="login.html";

    }

});

document.getElementById("logoutBtn").addEventListener("click",()=>{

    signOut(auth).then(()=>{

        window.location.href="login.html";

    });

});

</script>

</body>
  </html>
